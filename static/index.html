<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bíblia NVI</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#020617"> <!-- slate-950 -->
    <meta name="description" content="Bíblia Sagrada Nova Versão Internacional">
    
    <!-- Tailwind CSS (via CDN for simplicity, can be built later) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        background: 'var(--background)',
                        foreground: 'var(--foreground)',
                    }
                }
            }
        }
    </script>
    <style>
        :root {
            --background: #f8fafc; /* slate-50 */
            --foreground: #0f172a; /* slate-900 */
        }
        .dark {
            --background: #020617; /* slate-950 */
            --foreground: #f1f5f9; /* slate-100 */
        }
        body {
            background-color: var(--background);
            color: var(--foreground);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            transition: background-color 0.3s ease;
        }
        /* Esconder scrollbar para um visual mais limpo em mobile */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #475569;
            border-radius: 4px;
        }
    </style>
    
    <!-- Lógica de Tema (Dark/Light) e Tamanho da Fonte antes do carregamento da página para evitar FOUC -->
    <script>
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark')
        } else {
            document.documentElement.classList.remove('dark')
        }

        if (localStorage.fontSize) {
            document.documentElement.style.fontSize = localStorage.fontSize + '%';
        }
    </script>
</head>
<body class="antialiased min-h-screen flex flex-col">

    <!-- Header -->
    <header class="sticky top-0 z-50 w-full backdrop-blur supports-[backdrop-filter]:bg-background/60 border-b border-slate-200 dark:border-slate-800">
        <div class="container mx-auto px-4 h-14 flex items-center justify-between">
            <div class="flex items-center gap-2 cursor-pointer" onclick="app.showHome()">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-indigo-600 dark:text-indigo-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/></svg>
                <span class="font-bold text-lg tracking-tight">NVI Sagrada</span>
            </div>
            
            <div class="flex items-center gap-1 sm:gap-4">
                <div class="flex items-center border-r border-slate-200 dark:border-slate-800 pr-1 sm:pr-4 mr-1 sm:mr-0">
                    <button onclick="app.changeFontSize(-1)" class="p-2 rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors font-bold text-sm text-slate-600 dark:text-slate-300" title="Diminuir Fonte">A-</button>
                    <button onclick="app.changeFontSize(1)" class="p-2 rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors font-bold text-lg text-slate-600 dark:text-slate-300" title="Aumentar Fonte">A+</button>
                </div>
                <button id="search-btn" onclick="app.toggleSearch()" class="p-2 rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                </button>
                <button id="theme-toggle" onclick="app.toggleTheme()" class="p-2 rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
                    <!-- Icon is handled by JS -->
                </button>
            </div>
        </div>
    </header>

    <!-- Barra de Pesquisa (Escondida por padrão) -->
    <div id="search-bar" class="hidden bg-slate-100 dark:bg-slate-900 border-b border-slate-200 dark:border-slate-800 p-4">
        <div class="container mx-auto">
            <input type="text" id="search-input" placeholder="Digite um livro ou palavra..." class="w-full bg-white dark:bg-slate-800 border border-slate-300 dark:border-slate-700 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-colors">
        </div>
    </div>

    <!-- Main Content Area -->
    <main class="flex-1 container mx-auto px-4 py-6" id="main-content">
        <!-- Content injected by JS -->
        <div class="flex justify-center items-center h-40">
            <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-indigo-600"></div>
        </div>
    </main>

    <script src="/app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(reg => console.log('Service Worker registrado!', reg))
                    .catch(err => console.log('Falha no registro do Service Worker:', err));
            });
        }
    </script>
</body>
</html>

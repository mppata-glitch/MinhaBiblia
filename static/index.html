<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bíblia NVI</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#020617"> <!-- slate-950 -->
    <meta name="description" content="Bíblia Sagrada Nova Versão Internacional">
    
    <!-- Tailwind CSS (via CDN for simplicity, can be built later) -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="apple-touch-icon" href="/favicon.svg">
    <link rel="stylesheet" href="/output.css?v=0.94.00">

    <style>
        :root {
            --background: #f8fafc; /* slate-50 */
            --foreground: #0f172a; /* slate-900 */
        }
        .dark {
            --background: #020617; /* slate-950 */
            --foreground: #f1f5f9; /* slate-100 */
        }
        body {
            background-color: var(--background);
            color: var(--foreground);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            transition: background-color 0.3s ease;
        }
        /* Esconder scrollbar para um visual mais limpo em mobile */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #475569;
            border-radius: 4px;
        }
    </style>
    
    <!-- Lógica de Tema (Dark/Light) e Tamanho da Fonte antes do carregamento da página para evitar FOUC -->
    <script>
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark')
        } else {
            document.documentElement.classList.remove('dark')
        }

        if (localStorage.fontSize) {
            document.documentElement.style.fontSize = localStorage.fontSize + '%';
        }
    </script>

    {{if .AnalyticsID}}
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id={{.AnalyticsID}}"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', '{{.AnalyticsID}}');
    </script>
    {{else}}
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-LCTY156292"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-LCTY156292');
    </script>
    {{end}}
</head>
<body class="antialiased min-h-screen flex flex-col">

    <!-- Header -->
    <header class="sticky top-0 z-50 w-full backdrop-blur supports-[backdrop-filter]:bg-background/60 border-b border-slate-200 dark:border-slate-800">
        <div class="container mx-auto px-4 h-16 flex items-center justify-between gap-2">
            <div class="flex items-center gap-2 shrink-0">
                <button onclick="app.toggleSidebar()" class="p-2 -ml-2 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors" title="Menu Lateral">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/></svg>
                </button>
                <div class="flex items-center gap-2 cursor-pointer" onclick="app.showHome()">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-indigo-600 dark:text-indigo-400 hidden sm:block" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/></svg>
                    <span class="font-bold text-lg tracking-tight hidden sm:block">NVI Sagrada</span>
                </div>
            </div>
            
            <div class="flex items-center gap-1 sm:gap-2 flex-1 justify-end">
                <!-- Barra de Pesquisa Fixa no Canto Direito -->
                <div class="relative w-full max-w-[280px]">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <svg class="h-4 w-4 text-slate-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                    </div>
                    <input type="text" id="search-input" placeholder="Buscar livro ou palavra..." class="w-full bg-slate-100 dark:bg-slate-800/80 border border-slate-200 dark:border-slate-700 focus:bg-white dark:focus:bg-slate-800 focus:border-indigo-400 dark:focus:border-indigo-500 rounded-full pl-9 pr-4 py-1.5 text-sm sm:text-base focus:outline-none focus:ring-2 focus:ring-indigo-500/20 transition-all text-slate-800 dark:text-slate-200 placeholder-slate-400">
                </div>

                <div class="flex items-center shrink-0 border-l border-slate-200 dark:border-slate-700 pl-1 sm:pl-2 ml-1 sm:ml-2">
                    <button onclick="app.changeFontSize(-1)" class="p-1.5 sm:p-2 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors font-serif font-bold text-sm" title="Diminuir Fonte">A-</button>
                    <button onclick="app.changeFontSize(1)" class="p-1.5 sm:p-2 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors font-serif font-bold text-lg" title="Aumentar Fonte">A+</button>
                    <button onclick="app.toggleTheme()" id="theme-toggle" class="p-1.5 sm:p-2 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors" title="Mudar Tema">
                        <!-- Icon placeholder -->
                    </button>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content Area -->
    <main class="flex-1 container mx-auto px-4 py-6" id="main-content">
        <!-- Content injected by JS -->
        <div class="flex justify-center items-center h-40">
            <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-indigo-600"></div>
        </div>
    </main>

    <!-- Rodapé -->
    <footer class="w-full py-6 mt-auto text-center text-sm text-slate-500 border-t border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-950">
        <div class="container mx-auto px-4">
            Todos os direitos reservados mpp.app.br | v0.94.00
        </div>
    </footer>

    <!-- Sidebar / Menu Lateral -->
    <div id="sidebar-overlay" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-[50] hidden transition-opacity opacity-0" onclick="app.toggleSidebar()"></div>
    <aside id="sidebar" class="fixed inset-y-0 left-0 z-[60] w-72 bg-white dark:bg-slate-900 border-r border-slate-200 dark:border-slate-800 transform -translate-x-full transition-transform duration-300 flex flex-col shadow-2xl">
        <div class="h-14 flex items-center justify-between px-4 border-b border-slate-200 dark:border-slate-800">
            <span class="font-bold text-lg">Índice</span>
            <button onclick="app.toggleSidebar()" class="p-2 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
            </button>
        </div>
        <div id="sidebar-content" class="flex-1 overflow-y-auto p-2 space-y-1">
            <!-- Sidebar list populated via JS -->
        </div>
    </aside>

    <script src="/app.js?v=0.94.00"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js?v=0.94.00')
                    .then(reg => console.log('Service Worker registrado!', reg))
                    .catch(err => console.log('Falha no registro do Service Worker:', err));
            });
        }
    </script>
</body>
</html>
